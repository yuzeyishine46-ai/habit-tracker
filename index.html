  { id:"mind",   lbl:"技能提升",   color:"#3b82f6", bg:"#e8f0fb", icon:"🧠" },
  { id:"work",   lbl:"賺錢任務",   color:"#c47d0e", bg:"#fdf3e0", icon:"⚔️" },
  { id:"life",   lbl:"日常任務",   color:"#b84f7a", bg:"#fce8f1", icon:"🏡" },

const DZ = ["一","二","三","四","五","六","日"];
const MZ = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

const MSGS = (name) => [
  [`${name}，新的一天開始了！`, "今日任務已解鎖，準備好了嗎？"],
  [`${name}，你回來了。`, "任務不會自己完成，趕快出發吧。"],

const MSG_HALF = (n) => [`進度 50%，${n} 還差一半。`, "別讓任務爛尾，我在記錄你的進度。"];
const MSG_NONE = (n) => [`今日任務：0 完成。`, `${n} 冒險者呢？任務還在等待中...`];
const MSG_URG  = (n) => [`${n}，緊急任務尚未解決！`, "先清掉紅色的再說，其他等你。"];

// ── Helpers ──
function localDateStr(d) {
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function todayKey() { const d=new Date(); return localDateStr(d); }
function getTodayWeekday() { return (new Date().getDay()+6)%7; }
function getWeekdays(offset=0) {
  const t=new Date(), m=new Date(t);
  m.setDate(t.getDate()-((t.getDay()+6)%7)+offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return localDateStr(d); });
}
function scheduledOn(h,dk) {
  const d=new Date(dk+"T00:00:00");
  if(h.freq==="date")    return h.date===dk;
  if(h.freq==="wdays")   return h.wdays&&h.wdays.includes((d.getDay()+6)%7);
  if(h.freq==="monthly") return d.getDate()===h.mday;
  return true;
}
function catObj(id) { return CATS.find(c=>c.id===id)||CATS[0]; }
function freqLbl(h) {
  if(h.freq==="date")                      return "📅 "+h.date;
  if(h.freq==="wdays"&&h.wdays?.length)    return "📆 每週"+h.wdays.map(d=>DZ[d]).join("、");
  if(h.freq==="monthly")                   return "🗓 每月"+h.mday+"日";
  return "🔁 每日";
}

// ── ChineseInput ──
function ChineseInput({ style, placeholder, initialValue, onValueChange, onEnter, autoFocus }) {
  const ref = useRef(null);
  const composing = useRef(false);
  useEffect(()=>{ if(ref.current) ref.current.value=initialValue||""; },[initialValue]);
  return (
    <input ref={ref} style={style} placeholder={placeholder} autoFocus={autoFocus}
      onCompositionStart={()=>{ composing.current=true; }}
      onCompositionEnd={e=>{ composing.current=false; onValueChange(e.target.value); }}
      onChange={e=>{ if(!composing.current) onValueChange(e.target.value); }}
      onKeyDown={e=>{ if(e.key==="Enter"&&!composing.current&&onEnter) onEnter(); }}
    />
  );
}

function App() {
  // ── Core state ──
  const [gameId, setGameId]   = useState(()=>localStorage.getItem("k-gameid")||"");
  const [habits, setHabits]   = useState([]);
  const [done, setDone]       = useState({});
  const [page, setPage]       = useState("team");
  const [tab, setTab]         = useState("today");
  const [modal, setModal]     = useState(false);
  const [editId, setEditId]   = useState(null);
  const [form, setForm]       = useState({...EMPTY_F,wdays:[]});
  const [calY, setCalY]       = useState(new Date().getFullYear());
  const [calM, setCalM]       = useState(new Date().getMonth());
  const [randMsg]             = useState(()=>{ const m=MSGS(""); return m[Math.floor(Math.random()*m.length)]; });
  // Notion state
  const [ntasks, setNtasks]   = useState([]);
  const [nrecords, setNrecords] = useState([]);
  const [nscores, setNscores] = useState([]);
  const [nloading, setNloading] = useState(false);
  const [nerror, setNerror]   = useState("");
  // Manage tab
  const [manageTab, setManageTab] = useState("personal");
  // Team task modal
  const [teamModal, setTeamModal] = useState(false);
  const [teamForm, setTeamForm]   = useState({name:"",type:"家事",score:10,period:"每日",desc:"",active:true});
  const [teamEditId, setTeamEditId] = useState(null);

  useEffect(()=>{
    try {
      const r=localStorage.getItem(SK);
      if(r){ const d=JSON.parse(r); setHabits(d.habits||[]); setDone(d.done||{}); }
    } catch(e){}
  },[]);

  useEffect(()=>{
    if(page==="team"||page==="achieve") { fetchAll(); }
  },[page]);

  function persist(h,d) {
    try { localStorage.setItem(SK,JSON.stringify({habits:h,done:d})); } catch(e){}
  }

  // ── Notion API ──
  async function fetchAll() {
    setNloading(true); setNerror("");
    try {
      const [t,r,s] = await Promise.all([
        fetch(WORKER+"/tasks").then(x=>x.json()),
        fetch(WORKER+"/records?date="+todayKey()).then(x=>x.json()),
        fetch(WORKER+"/scores").then(x=>x.json()),
      ]);
      setNtasks(Array.isArray(t)?t:[]);
      setNrecords(Array.isArray(r)?r:[]);
      setNscores(Array.isArray(s)?s:[]);
    } catch(e) { setNerror("無法連接伺服器"); }
    setNloading(false);
  }

  async function claimTask(task) {
    if(!gameId) return;
    try {
      await fetch(WORKER+"/records",{ method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({player:gameId, taskId:task.id, taskName:task.name, score:task.score})
      });
      const r=await fetch(WORKER+"/records?date="+todayKey()).then(x=>x.json());
      setNrecords(Array.isArray(r)?r:[]);
    } catch(e){ setNerror("承接失敗，請重試"); }
  }

  async function completeTask(record) {
    try {
      await fetch(WORKER+"/records/"+record.id,{ method:"PATCH",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({status:"已完成",player:record.player,score:record.score})
      });
      const [r,s]=await Promise.all([
        fetch(WORKER+"/records?date="+todayKey()).then(x=>x.json()),
        fetch(WORKER+"/scores").then(x=>x.json()),
      ]);
      setNrecords(Array.isArray(r)?r:[]); setNscores(Array.isArray(s)?s:[]);
    } catch(e){ setNerror("更新失敗"); }
  }

  async function abandonTask(record) {
    try {
      await fetch(WORKER+"/records/"+record.id,{ method:"PATCH",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({status:"放棄",player:record.player,score:0})
      });
      const r=await fetch(WORKER+"/records?date="+todayKey()).then(x=>x.json());
      setNrecords(Array.isArray(r)?r:[]);
    } catch(e){}
  }

  async function saveTeamTask() {
    if(!teamForm.name.trim()) return;
    try {
      if(teamEditId) {
        await fetch(WORKER+"/tasks/"+teamEditId,{ method:"PATCH",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(teamForm)
        });
      } else {
        await fetch(WORKER+"/tasks",{ method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(teamForm)
        });
      }
      const t=await fetch(WORKER+"/tasks").then(x=>x.json());
      setNtasks(Array.isArray(t)?t:[]);
      setTeamModal(false); setTeamEditId(null);
      setTeamForm({name:"",type:"家事",score:10,period:"每日",desc:"",active:true});
    } catch(e){ setNerror("儲存失敗"); }
  }

  async function deleteTeamTask(id) {
    try {
      await fetch(WORKER+"/tasks/"+id,{ method:"DELETE" });
      setNtasks(ntasks.filter(t=>t.id!==id));
    } catch(e){ setNerror("刪除失敗"); }
  }

  // ── Personal habit actions ──
  function toggle(id,dk) {
    const nd={...done,[id+":"+dk]:!done[id+":"+dk]};
    setDone(nd); persist(habits,nd);
  }
  function saveHabit() {
    const name=form.name.trim(); if(!name) return;
    const obj={name,category:form.cat,freq:form.freq,
      wdays:form.freq==="wdays"?[...form.wdays]:[],
      date:form.freq==="date"?form.date:"",
      mday:form.freq==="monthly"?form.mday:1,
      urgent:form.urgent};
    let nh;
    if(editId){ nh=habits.map(h=>h.id===editId?{...h,...obj}:h); }
    else{ nh=[...habits,{id:Date.now().toString(),...obj,created:todayKey()}]; }
    setHabits(nh); persist(nh,done); setEditId(null); setModal(false);
  }
  function deleteHabit(id) {
    const nh=habits.filter(h=>h.id!==id); setHabits(nh); persist(nh,done);
  }
  function openEdit(id) {
    const h=habits.find(x=>x.id===id); if(!h) return;
    setEditId(id);
    setForm({name:h.name,cat:h.category,freq:h.freq||"everyday",
      wdays:h.wdays?[...h.wdays]:[],date:h.date||"",mday:h.mday||1,urgent:!!h.urgent});
    setModal(true);
  }
  function openAdd() { setEditId(null); setForm({...EMPTY_F,wdays:[]}); setModal(true); }
  function toggleWday(d) {
    setForm(f=>({...f,wdays:f.wdays.includes(d)?f.wdays.filter(x=>x!==d):[...f.wdays,d]}));
  }

  // ── Welcome screen ──
  const [inputId, setInputId] = useState("");
  if(!gameId) return (
    <div style={{...s.app, display:"flex", flexDirection:"column", alignItems:"center",
      justifyContent:"flex-start", paddingTop:"18vh", padding:"18vh 28px 40px", gap:20}}>
      <style>{`@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
      {/* 小K + 對話 並排 */}
      <div style={{display:"flex", alignItems:"center", gap:14, maxWidth:320, width:"100%"}}>
        {kImg(80,90)}
        <div style={{flex:1}}>
          <div style={{fontSize:16, fontWeight:900, color:C.txt, marginBottom:4}}>小K：歡迎來到任務系統！</div>
          <div style={{fontSize:13, color:C.mut, lineHeight:1.6}}>請輸入你的遊戲 ID，<br/>我會記住你的！</div>
        </div>
      </div>
      {/* 輸入框 + 按鈕 */}
      <div style={{display:"flex", flexDirection:"column", alignItems:"center", gap:12, width:"100%", maxWidth:280}}>
        <ChineseInput
          style={{...s.ifield, marginBottom:0, textAlign:"center", fontSize:18, fontWeight:900,
            borderRadius:16, padding:"14px 20px", width:"100%"}}
          placeholder="輸入你的 ID..."
          initialValue={inputId}
          onValueChange={setInputId}
          onEnter={()=>{ if(inputId.trim()){ localStorage.setItem("k-gameid",inputId.trim()); setGameId(inputId.trim()); } }}
          autoFocus
        />
        <button
          onClick={()=>{ if(inputId.trim()){ localStorage.setItem("k-gameid",inputId.trim()); setGameId(inputId.trim()); } }}
          style={{...s.bsave, flex:"none", padding:"14px 0", borderRadius:14, fontSize:15, width:"100%"}}>
          開始冒險 🎮
        </button>
      </div>
    </div>
  );

  const name = gameId;
  const tk = todayKey();
  const wk = getWeekdays(0);
  const nwk = getWeekdays(1);
  const todayH = habits.filter(h=>scheduledOn(h,tk));
  const progress = todayH.length ? Math.round(todayH.filter(h=>done[h.id+":"+tk]).length/todayH.length*100) : 0;
  const urgentPending = habits.filter(h=>h.urgent&&!done[h.id+":"+tk]);

  function getMsg() {
    const msgs = MSGS(name);
    const rMsg = msgs[Math.floor(Math.random()*msgs.length)];
    const up = urgentPending;
    if(up.length) return MSG_URG(name);
    if(!todayH.length) return rMsg;
    if(progress===100) return MSG_ALL(name);
    if(progress>=50)   return MSG_HALF(name);
    if(progress===0)   return MSG_NONE(name);
    return rMsg;
  }
  const [m1,m2] = getMsg();

  // ── Calendar ──
  function CalView() {
    const y=calY,m=calM;
    const first=(new Date(y,m,1).getDay()+6)%7;
    const days=new Date(y,m+1,0).getDate();
    const cells=[]; for(let i=0;i<first;i++) cells.push(null); for(let d=1;d<=days;d++) cells.push(d);
    return (
      <div style={{...s.card(), margin:"0 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:900}}>{y}年 {MZ[m]}</div>
          <div style={{display:"flex",gap:4}}>
            <button style={{background:"none",border:"1.5px solid "+C.bdr,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,color:C.mut}}
              onClick={()=>{ if(calM===0){setCalY(y=>y-1);setCalM(11);}else setCalM(m=>m-1); }}>‹</button>
            <button style={{background:"none",border:"1.5px solid "+C.bdr,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,color:C.mut}}
              onClick={()=>{ if(calM===11){setCalY(y=>y+1);setCalM(0);}else setCalM(m=>m+1); }}>›</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",textAlign:"center",marginBottom:4}}>
          {DZ.map(d=><div key={d} style={{fontSize:9,fontWeight:700,color:C.mut}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {cells.map((d,i)=>{
            if(!d) return <div key={i}/>;
            const dk=localDateStr(new Date(y,m,d)), isT=dk===tk;
            const sc=habits.filter(h=>scheduledOn(h,dk));
            const dotCats=[...new Set(sc.map(h=>h.category))].slice(0,3);
            const hasU=sc.some(h=>h.urgent&&!done[h.id+":"+dk]);
            return (
              <div key={i} style={{aspectRatio:"1",borderRadius:7,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontSize:10,fontWeight:700,background:isT?C.txt:"transparent",color:isT?"#fff":C.txt,
                  borderRadius:"50%",width:isT?20:undefined,height:isT?20:undefined,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>{d}</div>
                {sc.length>0&&<div style={{display:"flex",gap:2,marginTop:1}}>
                  {dotCats.map(cid=><div key={cid} style={{width:4,height:4,borderRadius:"50%",background:catObj(cid).color}}/>)}
                  {hasU&&<div style={{width:4,height:4,borderRadius:"50%",background:C.red}}/>}
                </div>}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
          {CATS.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:C.mut}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:c.color}}/>{c.icon}{c.lbl}
          </div>)}
        </div>
      </div>
    );
  }

  // ── Personal Habit Modal ──
  function HabitModal() {
    const isE=!!editId, f=form;
    return (
      <div style={s.modalBg} onClick={e=>{ if(e.target===e.currentTarget) setModal(false); }}>
        <div style={s.modal}>
          <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:18}}>
            {kImg(42,47)}
            <div>
              <div style={{fontSize:16,fontWeight:900}}>{isE?"編輯任務":"接受任務"}</div>
              <div style={{fontSize:12,color:C.mut,marginTop:2}}>{isE?"修改任務內容，確認後提交。":"認真填，不然我會不高興。"}</div>
            </div>
          </div>
          <ChineseInput style={s.ifield} placeholder="例如：跑步 30 分鐘、閱讀 20 頁"
            initialValue={f.name} onValueChange={v=>setForm(f=>({...f,name:v}))}
            onEnter={saveHabit} autoFocus/>
          <div style={s.slbl}>任務類型</div>
          <div style={{display:"flex",gap:7,marginBottom:18}}>
            {CATS.map(c=><button key={c.id} style={{flex:1,padding:"11px 3px",borderRadius:13,border:"none",
              background:f.cat===c.id?c.bg:"#dde3ec",cursor:"pointer",fontSize:11,fontWeight:700,
              fontFamily:"inherit",color:f.cat===c.id?c.color:C.mut}}
              onClick={()=>setForm(f=>({...f,cat:c.id}))}>
              <span style={{fontSize:17,display:"block",marginBottom:3}}>{c.icon}</span>{c.lbl}
            </button>)}
          </div>

              </div>
            ))}
          </div>
        }
      </div>
      <div style={{height:20}}/>
    </>);
  }

        }
      </div>
      {/* FAB */}
      <button onClick={openAdd} style={{position:"fixed",bottom:80,right:20,width:50,height:50,borderRadius:"50%",
        background:C.txt,border:"none",cursor:"pointer",fontSize:24,color:"#f0f4f8",
        boxShadow:"0 4px 20px rgba(26,35,51,.25)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>＋</button>
      <div style={{height:20}}/>
    </>);
  }

  // ── Achieve Page ──
  function AchievePage() {
    const now=new Date(),year=now.getFullYear(),month=now.getMonth();
    const daysInMonth=new Date(year,month+1,0).getDate();
    const allDays=Array.from({length:daysInMonth},(_,i)=>localDateStr(new Date(year,month,i+1)));
    const personalStats=habits.map(h=>{
      const sDays=allDays.filter(dk=>scheduledOn(h,dk));
      const cDays=sDays.filter(dk=>done[h.id+":"+dk]);
      return {h,total:sDays.length,completed:cDays.length,pct:sDays.length?Math.round(cDays.length/sDays.length*100):0};
    }).filter(s=>s.total>0);
    const totalSched=personalStats.reduce((a,s)=>a+s.total,0);
    const totalDone=personalStats.reduce((a,s)=>a+s.completed,0);
    const overallPct=totalSched?Math.round(totalDone/totalSched*100):0;

    function kMsg() {
      if(nscores.length===0&&habits.length===0) return ["任務清單是空的。","快去新增任務開始冒險吧！"];
      if(overallPct===100) return [`${name} 本月全制霸！！`,"所有個人任務都完成了，傳說級冒險者！"];
      if(overallPct>=80)   return ["本月表現優秀！","再一點點就滿星了，繼續衝！"];
      if(overallPct>=50)   return ["過半了，不錯。","後半段要加把勁，別讓任務爛尾。"];
      return [`${name}，這個月加把油吧。`,"任務完成率偏低，需要加速了。"];
    }
    const [am1,am2]=kMsg();
    const myTeamScore=nscores.find(s=>s.player===name);

    return (<>
      <div style={{padding:"44px 20px 0"}}>
        <div style={{display:"flex",alignItems:"stretch",gap:12,marginBottom:16}}>
          {kImg(76,86)}
          <div style={s.bubble}><strong>小K：</strong>{am1}<br/><span style={{fontWeight:400,opacity:.75}}>{am2}</span></div>
        </div>

        {/* 個人任務成就 */}
        <div style={{fontSize:12,fontWeight:900,color:C.mut,letterSpacing:2,marginBottom:10}}>📋 個人任務 — {MZ[month]}完成率</div>
        <div style={{...s.card(),display:"flex",alignItems:"center",gap:16,marginBottom:14}}>
          <div style={{position:"relative",width:64,height:64,flexShrink:0}}>
            <svg width="64" height="64" viewBox="0 0 64 64" style={{transform:"rotate(-90deg)"}}>
              <circle cx="32" cy="32" r="26" fill="none" stroke={C.bdr} strokeWidth="6"/>
              <circle cx="32" cy="32" r="26" fill="none"
                stroke={overallPct>=80?C.grn:overallPct>=50?"#c47d0e":"#3b82f6"}
                strokeWidth="6" strokeLinecap="round"
                strokeDasharray={+(2*Math.PI*26).toFixed(1)}
                strokeDashoffset={+(2*Math.PI*26*(1-overallPct/100)).toFixed(1)}
                style={{transition:"stroke-dashoffset 1s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900}}>{overallPct}%</div>
          </div>
          <div>
            <div style={{fontSize:18,fontWeight:900}}>{name} 的成就</div>
            <div style={{fontSize:12,color:C.mut,marginTop:3}}>已完成 {totalDone} / {totalSched} 次排程</div>
          </div>
        </div>

        {/* 團隊任務積分 */}
        <div style={{fontSize:12,fontWeight:900,color:C.mut,letterSpacing:2,marginBottom:10}}>🏠 團隊任務 — 積分排行</div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          {nscores.length===0
            ?<div style={{...s.card(),flex:1,textAlign:"center",padding:"20px"}}>
              <div style={{fontSize:12,color:C.mut}}>載入中...</div>
            </div>
            :[...nscores].sort((a,b)=>(b.totalScore||0)-(a.totalScore||0)).map((sc,i)=>(
              <div key={sc.player} style={{flex:1,...s.card(i===0?"#fcd34d":"#dde4ed"),
                background:i===0?"#fefce8":"#fff",textAlign:"center"}}>
                <div style={{fontSize:16,marginBottom:4}}>{i===0?"🥇":"🥈"}</div>
                <div style={{fontSize:13,fontWeight:900,color:C.txt}}>{sc.player}</div>
                <div style={{fontSize:22,fontWeight:900,color:i===0?"#c47d0e":C.txt,marginTop:2}}>{sc.totalScore||0}</div>
                <div style={{fontSize:10,color:C.mut}}>累計積分</div>
                <div style={{fontSize:11,color:"#3b82f6",fontWeight:700,marginTop:2}}>本月 {sc.monthScore||0}</div>
                <div style={{fontSize:10,color:C.mut,marginTop:1}}>完成 {sc.totalDone||0} 次</div>
              </div>
            ))
          }
        </div>
      </div>

      {/* 個人任務逐條 */}
      <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:9,paddingBottom:16}}>
        {personalStats.length===0
          ?<div style={{textAlign:"center",padding:"28px 0",border:"1.5px dashed "+C.bdr,borderRadius:18}}>
            <div style={{fontSize:13,color:C.mut}}>本月沒有個人任務排程。</div>
          </div>
          :[...personalStats].sort((a,b)=>a.pct-b.pct).map(({h,total,completed,pct})=>{
            const c=catObj(h.category),isDone=pct===100;
            return <div key={h.id} style={{...s.card(isDone?"#bbf7d0":C.bdr),background:isDone?"#f7fdf9":C.sur}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <span style={{fontSize:20,flexShrink:0}}>{isDone?"✅":c.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:isDone?C.mut:C.txt,textDecoration:isDone?"line-through":"none"}}>{h.name}</div>
                  <div style={{fontSize:11,color:C.mut,marginTop:1,display:"flex",gap:4,alignItems:"center"}}>
                    <span style={{color:c.color}}>{c.lbl}</span><span>·</span><span>{completed}/{total} 次完成</span>
                  </div>
                </div>
                <div style={{fontSize:15,fontWeight:900,color:pct===100?C.grn:pct>=50?"#c47d0e":C.dim,flexShrink:0}}>{pct}%</div>
              </div>
              <div style={{height:6,background:"#eff2f6",borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:99,width:pct+"%",transition:"width 1s",
                  background:pct===100?C.grn:pct>=50?"#c47d0e":"#3b82f6"}}/>
              </div>
            </div>;
          })
        }
      </div>
    </>);
  }

  // ── Manage Page ──
  function ManagePage() {
    return (<>
      <div style={{padding:"44px 20px 14px"}}>
        <div style={{fontSize:24,fontWeight:900}}>任務管理</div>
        <div style={{fontSize:13,color:C.mut,marginTop:3}}>管理個人與團隊任務</div>
      </div>
      {/* Manage tabs */}
      <div style={{display:"flex",padding:"0 20px",gap:6,marginBottom:14}}>
        <button style={s.tab(manageTab==="personal")} onClick={()=>setManageTab("personal")}>個人任務</button>
        <button style={s.tab(manageTab==="team")} onClick={()=>setManageTab("team")}>團隊任務</button>
      </div>

      {manageTab==="personal"?(<>
        <div style={{padding:"0 20px",marginBottom:10}}>
          <button style={{width:"100%",padding:13,borderRadius:14,border:"1.5px dashed "+C.bdr,background:"transparent",
            cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",color:C.mut,
            display:"flex",alignItems:"center",justifyContent:"center",gap:7}}
            onClick={openAdd}>＋ 新增個人任務</button>
        </div>
        <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:9}}>
          {habits.length===0
            ?<div style={{textAlign:"center",padding:"36px 0",border:"1.5px dashed "+C.bdr,borderRadius:18}}>
              <div style={{fontSize:13,color:C.mut}}>還沒有個人任務，點上方按鈕新增！</div>
            </div>
            :habits.map((h,i)=>{ const c=catObj(h.category);
              return <div key={h.id} style={{...s.card(h.urgent?"#f5c6c6":C.bdr),display:"flex",alignItems:"center",gap:11}}>
                <div style={{fontSize:22,flexShrink:0}}>{c.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700}}>{h.name}</div>
                  <div style={{fontSize:11,color:C.mut,marginTop:2,display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                    {h.urgent&&<span style={s.badge}>緊急</span>}
                    <span style={s.sbadge}>{freqLbl(h)}</span>
                    <span style={{color:c.color}}>{c.lbl}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:3}}>
                  <button style={{...s.editBtn,fontSize:16}} onClick={()=>openEdit(h.id)}>✎</button>
                  <button style={s.delBtn} onClick={()=>deleteHabit(h.id)}>×</button>
                </div>
              </div>; })
          }
        </div>
      </>):(<>
        <div style={{padding:"0 20px",marginBottom:10}}>
          <button style={{width:"100%",padding:13,borderRadius:14,border:"1.5px dashed "+C.bdr,background:"transparent",
            cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",color:C.mut,
            display:"flex",alignItems:"center",justifyContent:"center",gap:7}}
            onClick={()=>{ setTeamForm({name:"",type:"家事",score:10,period:"每日",desc:"",active:true}); setTeamEditId(null); setTeamModal(true); }}>
            ＋ 新增團隊任務</button>
        </div>
        {nerror&&<div style={{margin:"0 20px 10px",padding:"10px 14px",background:"#fff5f5",border:"1.5px solid #f5c6c6",borderRadius:12,fontSize:12,color:C.red}}>{nerror}</div>}
        <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:9}}>
          {ntasks.length===0
            ?<div style={{textAlign:"center",padding:"36px 0",border:"1.5px dashed "+C.bdr,borderRadius:18}}>
              <div style={{fontSize:13,color:C.mut}}>還沒有團隊任務，點上方按鈕新增！</div>
            </div>
            :ntasks.map(task=>(
              <div key={task.id} style={{...s.card(),display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22,flexShrink:0}}>{TYPE_ICON[task.type]||"📌"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700}}>{task.name}</div>
                  <div style={{fontSize:11,color:C.mut,marginTop:2,display:"flex",gap:5,alignItems:"center"}}>
                    <span style={s.sbadge}>{task.type}</span>
                    <span style={{background:"#e8f5ee",color:C.grn,padding:"1px 6px",borderRadius:5,fontSize:10,fontWeight:700}}>+{task.score}</span>
                    <span>{task.period}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:3}}>
                  <button style={{...s.editBtn,fontSize:16}} onClick={()=>{
                    setTeamEditId(task.id);
                    setTeamForm({name:task.name,type:task.type,score:task.score,period:task.period,desc:task.desc,active:true});
                    setTeamModal(true);
                  }}>✎</button>
                  <button style={s.delBtn} onClick={()=>deleteTeamTask(task.id)}>×</button>
                </div>
              </div>
            ))
          }
        </div>
      </>)}
      <div style={{height:20}}/>
    </>);
  }

  return (
    <div style={s.app}>
      <style>{`@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
      {page==="team"?<TeamPage/>:page==="personal"?<PersonalPage/>:page==="achieve"?<AchievePage/>:<ManagePage/>}
      <div style={s.navOuter}>
        <div style={s.navInner}>
          <button style={s.navBtn(page==="team")} onClick={()=>setPage("team")}>
            <span style={{fontSize:20}}>🏠</span>
            <span style={s.navLbl(page==="team")}>團隊任務</span>
          </button>
          <button style={s.navBtn(page==="personal")} onClick={()=>setPage("personal")}>
            <span style={{fontSize:20}}>📋</span>
            <span style={s.navLbl(page==="personal")}>個人任務</span>
          </button>
          <button style={s.navBtn(page==="achieve")} onClick={()=>setPage("achieve")}>
            <span style={{fontSize:20}}>🏆</span>
            <span style={s.navLbl(page==="achieve")}>成就</span>
          </button>
          <button style={s.navBtn(page==="manage")} onClick={()=>setPage("manage")}>
            <span style={{fontSize:20}}>⚙️</span>
            <span style={s.navLbl(page==="manage")}>管理</span>
          </button>
        </div>
      </div>
      {modal&&<HabitModal/>}
      {teamModal&&<TeamModal/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
