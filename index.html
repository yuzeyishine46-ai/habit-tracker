function localDateStr(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayKey(){return localDateStr(new Date());}
function getWeekdays(offset){
  var off=offset||0,t=new Date(),m=new Date(t);
  m.setDate(t.getDate()-((t.getDay()+6)%7)+off*7);
  return Array.from({length:7},function(_,i){var d=new Date(m);d.setDate(m.getDate()+i);return localDateStr(d);});
}
function scheduledOn(h,dk){
  var d=new Date(dk+"T00:00:00");
  if(h.freq==="date")return h.date===dk;
  if(h.freq==="wdays")return h.wdays&&h.wdays.includes((d.getDay()+6)%7);
  if(h.freq==="monthly")return d.getDate()===h.mday;
  return true;
}

}
