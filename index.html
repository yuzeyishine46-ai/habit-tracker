function todayKey() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function localDateStr(d) {
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function getWeekdays() {
  const t = new Date(), m = new Date(t);
  m.setDate(t.getDate() - ((t.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return localDateStr(d); });
}
function getNextWeekdays() {
  const t = new Date(), m = new Date(t);
  m.setDate(t.getDate() - ((t.getDay()+6)%7) + 7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return localDateStr(d); });
}
function scheduledOn(h, dk) {
  const d = new Date(dk+"T00:00:00");
  if (h.freq==="date")    return h.date === dk;
  if (h.freq==="wdays")   return h.wdays && h.wdays.includes((d.getDay()+6)%7);
  if (h.freq==="monthly") return d.getDate() === h.mday;
  return true;
}
function catObj(id) { return CATS.find(c=>c.id===id) || CATS[0]; }
function freqLbl(h) {
  if (h.freq==="date")                        return "📅 "+h.date;
  if (h.freq==="wdays" && h.wdays?.length)    return "📆 每週"+h.wdays.map(d=>DZ[d]).join("、");
  if (h.freq==="monthly")                     return "🗓 每月"+h.mday+"日";
  return "🔁 每日";
}


// ChineseInput: handles IME composition correctly (works with Zhuyin/Pinyin)
function ChineseInput({ style, placeholder, initialValue, onValueChange, onEnter }) {
  const ref = useRef(null);
  const composing = useRef(false);

  useEffect(() => {
    if (ref.current) ref.current.value = initialValue || "";
  }, [initialValue]);

  return (
    <input
      ref={ref}
      style={style}
      placeholder={placeholder}
      autoFocus
      onCompositionStart={() => { composing.current = true; }}
      onCompositionEnd={e => {
        composing.current = false;
        onValueChange(e.target.value);
      }}
      onChange={e => {
        if (!composing.current) onValueChange(e.target.value);
      }}
      onKeyDown={e => { if (e.key === "Enter" && !composing.current) onEnter(); }}
    />
  );
}

function App() {
  const [habits, setHabits]   = useState([]);
  const [done, setDone]       = useState({});
  const [page, setPage]       = useState("home");
  const [tab, setTab]         = useState("today");
  const [modal, setModal]     = useState(false);
  const [editId, setEditId]   = useState(null);
  const [form, setForm]       = useState({...EMPTY_F, wdays:[]});
  const [calY, setCalY]       = useState(new Date().getFullYear());
  const [calM, setCalM]       = useState(new Date().getMonth());
  const [randMsg]             = useState(MSGS[Math.floor(Math.random()*MSGS.length)]);
  // Notion shared task system
  const [player, setPlayer]   = useState(()=>localStorage.getItem("k-player")||"");
  const [ntasks, setNtasks]   = useState([]);
  const [nrecords, setNrecords] = useState([]);
  const [nscores, setNscores] = useState([]);
  const [nloading, setNloading] = useState(false);
  const [nerror, setNerror]   = useState("");

  useEffect(()=>{
    try {
      const r = localStorage.getItem(SK);
      if (r) { const d=JSON.parse(r); setHabits(d.habits||[]); setDone(d.done||{}); }
    } catch(e) {}
  },[]);

  function persist(h, d) {
    try { localStorage.setItem(SK, JSON.stringify({habits:h, done:d})); } catch(e) {}
  }

  // ── Notion API helpers ──
  async function fetchNtasks() {
    try {
      setNloading(true); setNerror("");
      const r = await fetch(WORKER+"/tasks");
      const d = await r.json();
      setNtasks(d);
    } catch(e) { setNerror("無法連接伺服器"); }
    finally { setNloading(false); }
  }
  async function fetchNrecords() {
    try {
      const r = await fetch(WORKER+"/records?date="+todayKey());
      const d = await r.json();
      setNrecords(Array.isArray(d)?d:[]);
    } catch(e) {}
  }
  async function fetchNscores() {
    try {
      const r = await fetch(WORKER+"/scores");
      const d = await r.json();
      setNscores(Array.isArray(d)?d:[]);
    } catch(e) {}
  }
  async function claimTask(task) {
    try {
      await fetch(WORKER+"/records", { method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({player, taskId:task.id, taskName:task.name, score:task.score})
      });
      await fetchNrecords();
    } catch(e) { setNerror("認領失敗，請重試"); }
  }
  async function completeTask(record) {
    try {
      await fetch(WORKER+"/records/"+record.id, { method:"PATCH",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({status:"已完成", player:record.player, score:record.score})
      });
      await Promise.all([fetchNrecords(), fetchNscores()]);
    } catch(e) { setNerror("更新失敗，請重試"); }
  }
  async function abandonTask(record) {
    try {
      await fetch(WORKER+"/records/"+record.id, { method:"PATCH",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({status:"放棄", player:record.player, score:0})
      });
      await fetchNrecords();
    } catch(e) {}
  }

  useEffect(()=>{
    if(page==="chores") {
      fetchNtasks(); fetchNrecords(); fetchNscores();
    }
  },[page]);

  const tk = todayKey();
  const wk = getWeekdays();
  const nwk = getNextWeekdays();
  const todayH = habits.filter(h=>scheduledOn(h,tk));
  const progress = todayH.length ? Math.round(todayH.filter(h=>done[h.id+":"+tk]).length/todayH.length*100) : 0;
  const urgentPending = habits.filter(h=>h.urgent && !done[h.id+":"+tk]);

  function getMsg() {
    if (urgentPending.length) return MSG_URG;
    if (!todayH.length) return randMsg;
    if (progress===100) return MSG_ALL;
    if (progress>=50)  return MSG_HALF;
    if (progress===0)  return MSG_NONE;
    return randMsg;
  }
  const [m1,m2] = getMsg();

  function toggle(id, dk) {
    const key = id+":"+dk;
    const nd = {...done, [key]: !done[key]};
    setDone(nd); persist(habits, nd);
  }
  function saveHabit() {
    const name = form.name.trim(); if (!name) return;
    const obj = { name, category:form.cat, freq:form.freq,
      wdays: form.freq==="wdays" ? [...form.wdays] : [],
      date:  form.freq==="date"  ? form.date : "",
      mday:  form.freq==="monthly" ? form.mday : 1,
      urgent: form.urgent };
    let nh;
    if (editId) {
      nh = habits.map(h => h.id===editId ? {...h,...obj} : h);
    } else {
      nh = [...habits, {id:Date.now().toString(), ...obj, created:tk}];
    }
    setHabits(nh); persist(nh, done);
    setModal(false); setEditId(null);
  }
  function deleteHabit(id) {
    const nh = habits.filter(h=>h.id!==id);
    setHabits(nh); persist(nh, done);
  }
  function openEdit(id) {
    const h = habits.find(x=>x.id===id); if(!h) return;
    setEditId(id);
    setForm({name:h.name, cat:h.category, freq:h.freq||"everyday",
      wdays:h.wdays?[...h.wdays]:[], date:h.date||"", mday:h.mday||1, urgent:!!h.urgent});
    setModal(true);
  }
  function openAdd() {
    setEditId(null); setForm({...EMPTY_F, wdays:[]}); setModal(true);
  }
  function toggleWday(d) {
    setForm(f=>({...f, wdays: f.wdays.includes(d) ? f.wdays.filter(x=>x!==d) : [...f.wdays,d]}));
  }
  function streak(id) { return wk.filter(d=>done[id+":"+d]).length; }

    bcnl:{ flex:1, padding:14, borderRadius:13, border:"1.5px solid #dde4ed", background:"transparent", color:"#7a8fa6", cursor:"pointer", fontSize:13, fontWeight:700, fontFamily:"inherit" },

  // ── Calendar ──
  function CalView() {
    const first = (new Date(calY,calM,1).getDay()+6)%7;
    const days  = new Date(calY,calM+1,0).getDate();
    const cells = [];
    for(let i=0;i<first;i++) cells.push(null);
    for(let d=1;d<=days;d++) cells.push(d);
    function dk(d){ return localDateStr(new Date(calY,calM,d)); }
    return (
      <div style={s.cal}>
        <div style={s.calHdr}>
          <div style={{fontSize:14,fontWeight:900}}>{calY}年 {MZ[calM]}</div>
          <div style={{display:"flex",gap:4}}>
            <button style={s.calNavBtn} onClick={()=>{ if(calM===0){setCalY(y=>y-1);setCalM(11);}else setCalM(m=>m-1); }}>‹</button>
            <button style={s.calNavBtn} onClick={()=>{ if(calM===11){setCalY(y=>y+1);setCalM(0);}else setCalM(m=>m+1); }}>›</button>
          </div>
        </div>
        <div style={s.calDnames}>{DZ.map(d=><div key={d} style={{fontSize:9,fontWeight:700,color:"#7a8fa6",textAlign:"center"}}>{d}</div>)}</div>
        <div style={s.calGrid}>
          {cells.map((d,i)=>{
            if(!d) return <div key={i}/>;
            const dk2=dk(d), isT=dk2===tk;
            const sc=habits.filter(h=>scheduledOn(h,dk2));
            const dotCats=[...new Set(sc.map(h=>h.category))].slice(0,3);
            const hasU=sc.some(h=>h.urgent&&!done[h.id+":"+dk2]);
            return (
              <div key={i} style={s.calCell(isT)}>
                <div style={s.calNum(isT)}>{d}</div>
                {sc.length>0 && <div style={{display:"flex",gap:2,marginTop:1}}>
                  {dotCats.map(cid=><div key={cid} style={{width:4,height:4,borderRadius:"50%",background:catObj(cid).color}}/>)}
                  {hasU && <div style={{width:4,height:4,borderRadius:"50%",background:"#c0392b"}}/>}
                </div>}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
          {CATS.map(c=>(
            <div key={c.id} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#7a8fa6"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:c.color}}/>
              {c.icon}{c.lbl}
            </div>
          ))}
          <div style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#7a8fa6"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#c0392b"}}/>🚨緊急
          </div>
        </div>
      </div>
    );
  }

              <div style={{fontSize:12,color:"#7a8fa6",marginTop:2}}>{isE?"修改任務內容，確認後提交。":"填寫任務細節，小K會幫你追蹤。"}</div>
            </div>
          </div>
          <ChineseInput

          <div style={s.slbl}>任務類型</div>
          <div style={{display:"flex",gap:7,marginBottom:18}}>
            {CATS.map(c=>(
              <button key={c.id} style={s.catBtn(form.cat===c.id,c)} onClick={()=>setForm(f=>({...f,cat:c.id}))}>
                <span style={{fontSize:17,display:"block",marginBottom:3}}>{c.icon}</span>{c.lbl}
              </button>

          </div>
          <div style={s.slbl}>重複週期</div>

  }

    const r=22, circ=+(2*Math.PI*r).toFixed(1), off=+(circ*(1-progress/100)).toFixed(1);
    const doneCnt = todayH.filter(h=>done[h.id+":"+tk]).length;
    return (<>
      <div style={s.hdr}>
        <div style={s.gRow}>
          <img src={K_IMG} style={{width:76,height:86,objectFit:"contain",filter:"drop-shadow(0 3px 10px rgba(0,0,0,.12))",animation:"bob 3s ease-in-out infinite"}} alt="小K"/>
          <div style={s.bubble}><strong>小K：</strong>{m1}<br/><span style={{fontWeight:400,opacity:.75}}>{m2}</span></div>
        </div>
      </div>
      {urgentPending.length>0 && (
        <div style={{...s.urgBan, margin:"14px 20px 0", marginBottom:"12px"}}>

                onClick={()=>toggle(h.id,tk)}>{dn?"✓":""}</button>
              <span style={{fontSize:13,fontWeight:700,flex:1,color:dn?"#b8c5d4":"#1a2333",textDecoration:dn?"line-through":"none"}}>{h.name}</span>
              <span>{c.icon}</span>
            </div>;
          })}
        </div>
      )}
      <CalView/>
      <div style={s.prog}>
        <div style={s.ring}>
          <svg width="54" height="54" viewBox="0 0 54 54" style={{transform:"rotate(-90deg)"}}>

            <circle cx="27" cy="27" r={r} fill="none" stroke="#2d7a4f" strokeWidth="5" strokeLinecap="round"

        </div>
        <div>
          <div style={{fontSize:19,fontWeight:900}}>{doneCnt}<span style={{fontSize:12,color:"#7a8fa6",fontWeight:500}}> / {todayH.length} 完成</span></div>
          <div style={{fontSize:11,color:"#7a8fa6",marginTop:2}}>今日任務進度</div>
        </div>
      </div>

      <div style={s.tabs}>
        <button style={s.tab(tab==="today")} onClick={()=>setTab("today")}>今日</button>
        <button style={s.tab(tab==="week")}  onClick={()=>setTab("week")}>本週</button>
        <button style={s.tab(tab==="nextweek")} onClick={()=>setTab("nextweek")}>下週</button>
      </div>

          <div style={{textAlign:"center",padding:"40px 0",border:"1.5px dashed #dde4ed",borderRadius:18}}>

            <div style={{fontSize:13,color:"#7a8fa6",lineHeight:1.6,marginTop:8}}>還沒有任何習慣。<br/>去管理分頁新增吧。</div>
          </div>
        ) : tab==="today" ? (
          todayH.length===0 ? (
            <div style={{textAlign:"center",padding:"36px 0",border:"1.5px dashed #dde4ed",borderRadius:18}}>
              <div style={{fontSize:13,color:"#7a8fa6",lineHeight:1.6}}>今天沒有排程的習慣。<br/>輕鬆一下也可以。</div>
            </div>
          ) : todayH.map((h,i)=>{
            const c=catObj(h.category), dn=!!done[h.id+":"+tk], st=streak(h.id);

              </div>

        ) : (()=>{
          // 決定顯示本週或下週
          const viewKeys = tab==="nextweek" ? nwk : wk;
          // 收集這週有排程的任務，依日期分組
          const dayTasks = viewKeys.map(dk2=>({
            dk: dk2,
            day: new Date(dk2+"T00:00:00"),
            tasks: habits.filter(h=>scheduledOn(h,dk2))
          })).filter(d=>d.tasks.length>0);

          if(dayTasks.length===0) return (
            <div style={{textAlign:"center",padding:"36px 0",border:"1.5px dashed #dde4ed",borderRadius:18}}>
              <div style={{fontSize:13,color:"#7a8fa6",lineHeight:1.6}}>
                {tab==="nextweek"?"下週沒有排程的任務。":"本週沒有排程的任務。"}
              </div>

          return dayTasks.map(({dk2_,day,tasks,dk})=>{

                    <span style={{fontSize:9,fontWeight:700,color:isToday?"#fff":"#1a2333",lineHeight:1}}>{dateLabel}</span>
                  </div>
                  <div style={{flex:1,height:1,background:"#eff2f6"}}/>
                  <span style={{fontSize:10,color:"#b8c5d4"}}>{tasks.length} 個任務</span>
                </div>
                {/* 任務列表 */}
                {tasks.map(h=>{
                  const cat=catObj(h.category);
                  const dn=!!done[h.id+":"+dk];
                  return (
                    <div key={h.id} style={{display:"flex",alignItems:"center",gap:10,
                      padding:"9px 12px",marginBottom:4,borderRadius:12,
                      background: dn?"#f7f9fc":"#fff",
                      border:"1.5px solid "+(h.urgent?"#f5c6c6":dn?"#e8edf3":"#e8edf3")}}>
                      <button style={{...s.chk(dn,cat.color),width:28,height:28,fontSize:12,flexShrink:0}}
                        onClick={()=>toggle(h.id,dk)}>{dn?"✓":""}</button>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,
                          color:dn?"#b8c5d4":"#1a2333",
                          textDecoration:dn?"line-through":"none"}}>{h.name}</div>
                        <div style={{fontSize:10,color:"#7a8fa6",marginTop:2,display:"flex",gap:4,alignItems:"center"}}>
                          {h.urgent&&<span style={s.badge}>緊急</span>}
                          <span style={{color:cat.color}}>{cat.icon}</span>{cat.lbl}

                    </div>
                  );
                })}

            );
          });
        })()}
      </div>
      {/* FAB - left side so it doesn't block edit/delete buttons on the right */}
      <button
        onClick={()=>{ setEditId(null); setForm({...EMPTY_F, wdays:[]}); setModal(true); }}
        style={{position:"fixed",bottom:76,right:20,width:50,height:50,borderRadius:"50%",background:"#1a2333",border:"none",cursor:"pointer",fontSize:24,color:"#f0f4f8",boxShadow:"0 4px 20px rgba(26,35,51,.25)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,lineHeight:1}}>
        ＋
      </button>
    </>);
  }

  // ── Manage Page ──

      <div style={{padding:"44px 20px 14px"}}>
        <div style={{fontSize:24,fontWeight:900}}>任務管理</div>

      </div>
      <div style={{padding:"10px 20px 0",display:"flex",flexDirection:"column",gap:9}}>

          const c=catObj(h.category);
          return <div key={h.id} style={{background:"#fff",border:"1.5px solid "+(h.urgent?"#f5c6c6":"#dde4ed"),borderRadius:16,padding:"13px 14px",display:"flex",alignItems:"center",gap:11}}>

  }



  // ── Chores Page (Notion shared tasks) ──
  function ChoresPage() {
    // Player selection screen
    if(!player) return (
      <div style={{padding:"60px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
        <img src={K_IMG} style={{width:90,height:100,objectFit:"contain",animation:"bob 3s ease-in-out infinite"}} alt="小K"/>
        <div style={{background:"#1a2333",color:"#f0f4f8",borderRadius:16,padding:"14px 18px",fontSize:14,fontWeight:600,lineHeight:1.6,textAlign:"center",maxWidth:280}}>
          <strong>小K：</strong>你是哪位冒險者？<br/>
          <span style={{fontWeight:400,opacity:.75}}>選好後才能認領任務喔！</span>
        </div>
        <div style={{display:"flex",gap:12,marginTop:8}}>
          {PLAYERS.map(p=>(
            <button key={p} onClick={()=>{ localStorage.setItem("k-player",p); setPlayer(p); }}
              style={{padding:"16px 28px",borderRadius:16,border:"none",background:"#1a2333",
                color:"#f0f4f8",fontSize:16,fontWeight:900,cursor:"pointer",
                boxShadow:"0 4px 20px rgba(26,35,51,.2)"}}>
              {p}
            </button>
          ))}
        </div>
      </div>
    );

    const tk = todayKey();
    // Tasks already claimed today (by anyone)
    const claimedIds = nrecords.map(r=>r.taskId);
    // My claimed tasks today
    const myRecords = nrecords.filter(r=>r.player===player);
    // Available tasks = not yet claimed by anyone
    const availTasks = ntasks.filter(t=>!claimedIds.includes(t.id));
    // Score summary
    const myScore = nscores.find(s=>s.player===player);
    const otherScore = nscores.find(s=>s.player!==player);
    const typeIcon = {"家事":"🧹","採買":"🛒","料理":"🍳","其他":"📦"};

    return (<>
      <div style={{padding:"44px 20px 0"}}>
        {/* 小K + 玩家切換 */}
        <div style={{display:"flex",alignItems:"stretch",gap:12,marginBottom:16}}>
          <img src={K_IMG} style={{width:72,height:82,objectFit:"contain",animation:"bob 3s ease-in-out infinite",flexShrink:0}} alt="小K"/>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
            <div style={{background:"#1a2333",color:"#f0f4f8",borderRadius:"14px 14px 14px 4px",
              padding:"10px 14px",fontSize:13,fontWeight:600,lineHeight:1.5}}>
              <strong>小K：</strong>
              {myRecords.filter(r=>r.status==="已完成").length > 0
                ? `${player} 已完成 ${myRecords.filter(r=>r.status==="已完成").length} 個任務，繼續衝！`
                : `${player}，今天還沒完成任何任務喔！`}
            </div>
            <button onClick={()=>{ localStorage.removeItem("k-player"); setPlayer(""); }}
              style={{alignSelf:"flex-start",background:"#eff2f6",border:"none",borderRadius:8,
                padding:"4px 10px",fontSize:11,fontWeight:700,color:"#7a8fa6",cursor:"pointer"}}>
              切換玩家 ↩
            </button>
          </div>
        </div>

        {/* 積分板 */}
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          {[myScore, otherScore].filter(Boolean).map(s=>(
            <div key={s.player} style={{flex:1,background: s.player===player?"#1a2333":"#fff",
              border:"1.5px solid "+(s.player===player?"#1a2333":"#dde4ed"),
              borderRadius:16,padding:"12px 14px",textAlign:"center"}}>
              <div style={{fontSize:11,fontWeight:700,color:s.player===player?"#f0f4f8":"#7a8fa6",marginBottom:4}}>
                {s.player===player?"👤 "+s.player:"👤 "+s.player}
                {s.player===player&&<span style={{fontSize:9,opacity:.6}}> (我)</span>}
              </div>
              <div style={{fontSize:22,fontWeight:900,color:s.player===player?"#4ade80":"#1a2333"}}>{s.totalScore||0}</div>
              <div style={{fontSize:10,color:s.player===player?"#f0f4f8":"#7a8fa6",opacity:.7}}>累計積分</div>
              <div style={{fontSize:11,color:s.player===player?"#a3e6c3":"#3b82f6",marginTop:2,fontWeight:700}}>本月 {s.monthScore||0} 分</div>
            </div>
          ))}
        </div>
      </div>

      {nerror && (
        <div style={{margin:"0 20px 10px",padding:"12px 14px",background:"#fff5f5",border:"1.5px solid #f5c6c6",borderRadius:12}}>
          <div style={{fontSize:12,color:"#c0392b",marginBottom:6}}>{nerror}</div>
          <button onClick={()=>{ setNerror(""); fetchNtasks(); fetchNrecords(); fetchNscores(); }}
            style={{fontSize:11,fontWeight:700,background:"#c0392b",color:"#fff",border:"none",
              borderRadius:7,padding:"5px 12px",cursor:"pointer"}}>重新連接</button>
        </div>
      )}

      {/* 我的進行中任務 */}
      {myRecords.filter(r=>r.status==="認領中").length>0 && (
        <div style={{padding:"0 20px",marginBottom:4}}>
          <div style={{fontSize:11,fontWeight:900,color:"#c47d0e",letterSpacing:1,marginBottom:8,padding:"4px 0"}}>⚡ 進行中的任務</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {myRecords.filter(r=>r.status==="認領中").map(record=>(
              <div key={record.id} style={{background:"#fdf3e0",border:"1.5px solid #f5c6a0",borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700}}>{record.taskName}</div>
                  <div style={{fontSize:11,color:"#c47d0e",marginTop:2}}>+{record.score} 積分</div>
                </div>
                <button onClick={()=>completeTask(record)}
                  style={{padding:"7px 14px",borderRadius:10,border:"none",background:"#2d7a4f",
                    color:"#fff",fontSize:12,fontWeight:900,cursor:"pointer"}}>完成 ✓</button>
                <button onClick={()=>abandonTask(record)}
                  style={{padding:"7px 10px",borderRadius:10,border:"1.5px solid #dde4ed",
                    background:"transparent",color:"#b8c5d4",fontSize:12,cursor:"pointer"}}>放棄</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 今日認領紀錄（已完成） */}
      {nrecords.filter(r=>r.status==="已完成").length>0 && (
        <div style={{padding:"12px 20px 0"}}>
          <div style={{fontSize:11,fontWeight:900,color:"#2d7a4f",letterSpacing:1,marginBottom:8}}>✅ 今日完成</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {nrecords.filter(r=>r.status==="已完成").map(r=>(
              <div key={r.id} style={{background:"#f7fdf9",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:700,flex:1,color:"#7a8fa6",textDecoration:"line-through"}}>{r.taskName}</span>
                <span style={{fontSize:11,color:"#2d7a4f",fontWeight:700}}>+{r.score}</span>
                <span style={{fontSize:11,color:"#b8c5d4"}}>{r.player}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 可認領任務 */}
      <div style={{padding:"12px 20px 0"}}>
        <div style={{fontSize:11,fontWeight:900,color:"#1a2333",letterSpacing:1,marginBottom:8}}>
          📋 今日可認領任務 {nloading&&"載入中..."}
        </div>
        {availTasks.length===0 && !nloading ? (
          <div style={{textAlign:"center",padding:"28px 0",border:"1.5px dashed #dde4ed",borderRadius:16}}>
            <div style={{fontSize:13,color:"#7a8fa6"}}>所有任務都被認領了！🎉</div>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {availTasks.map(task=>(
              <div key={task.id} style={{background:"#fff",border:"1.5px solid #dde4ed",borderRadius:14,padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22,flexShrink:0}}>{typeIcon[task.type]||"📌"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700}}>{task.name}</div>
                  <div style={{fontSize:11,color:"#7a8fa6",marginTop:2,display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{background:"#eff2f6",padding:"1px 6px",borderRadius:5,fontSize:10,fontWeight:600}}>{task.type}</span>
                    <span style={{background:"#e8f5ee",color:"#2d7a4f",padding:"1px 6px",borderRadius:5,fontSize:10,fontWeight:700}}>+{task.score} 分</span>
                    <span>{task.desc}</span>
                  </div>
                </div>
                <button onClick={()=>claimTask(task)}
                  style={{padding:"8px 14px",borderRadius:10,border:"none",background:"#1a2333",
                    color:"#f0f4f8",fontSize:12,fontWeight:900,cursor:"pointer",flexShrink:0}}>
                  認領
                </button>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{height:20}}/>
    </>);
  }

  // ── Achieve Page ──
  function AchievePage() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const monthStart = year+"-"+String(month+1).padStart(2,"0")+"-01";
    const monthEnd = year+"-"+String(month+1).padStart(2,"0")+"-"+String(new Date(year,month+1,0).getDate()).padStart(2,"0");

    // 取得這個月所有日期
    const daysInMonth = new Date(year,month+1,0).getDate();
    const allDays = Array.from({length:daysInMonth},(_,i)=>{
      const d=new Date(year,month,i+1); return localDateStr(d);
    });

    // 計算每個任務本月的完成狀況
    const stats = habits.map(h=>{
      const scheduledDays = allDays.filter(dk=>scheduledOn(h,dk));
      const completedDays = scheduledDays.filter(dk=>done[h.id+":"+dk]);
      return { h, scheduledDays, completedDays,
        total: scheduledDays.length,
        completed: completedDays.length,
        pct: scheduledDays.length>0 ? Math.round(completedDays.length/scheduledDays.length*100) : 0
      };
    }).filter(s=>s.total>0);

    // 整體完成率
    const totalScheduled = stats.reduce((a,s)=>a+s.total,0);
    const totalCompleted = stats.reduce((a,s)=>a+s.completed,0);
    const overallPct = totalScheduled>0 ? Math.round(totalCompleted/totalScheduled*100) : 0;

    // 小K 成就語錄
    function kAchieveMsg() {
      if(habits.length===0) return ["還沒有任何任務。","去任務管理新增你的第一個任務吧！"];
      if(overallPct===100) return ["本月全制霸！！","所有任務都完成了，傳說級冒險者！"];
      if(overallPct>=80)   return ["本月表現優秀！","再一點點就滿星了，繼續衝！"];
      if(overallPct>=50)   return ["過半了，不錯。","後半段要加把勁，別讓任務爛尾。"];
      if(overallPct>=20)   return ["才剛開始嗎？","本月任務完成率偏低，需要加速了。"];
      return ["...這個月你還好嗎？","任務幾乎都沒完成，我在擔心你。"];
    }
    const [am1,am2] = kAchieveMsg();

    const MONTHS_ZH2=["一","二","三","四","五","六","七","八","九","十","十一","十二"];

    return (<>
      <div style={{padding:"44px 20px 0"}}>
        {/* 小K 互動區 */}
        <div style={{display:"flex",alignItems:"stretch",gap:12,marginBottom:20}}>
          <img src={K_IMG} style={{width:76,height:86,objectFit:"contain",
            filter:"drop-shadow(0 3px 10px rgba(0,0,0,.12))",
            animation:"bob 3s ease-in-out infinite",flexShrink:0}} alt="小K"/>
          <div style={{background:"#1a2333",color:"#f0f4f8",borderRadius:"16px 16px 16px 4px",
            padding:"11px 14px",fontSize:13,fontWeight:600,lineHeight:1.6,flex:1,
            display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <strong>小K：</strong>{am1}<br/>
            <span style={{fontWeight:400,opacity:.75}}>{am2}</span>
          </div>
        </div>

        {/* 月份標題 + 整體進度環 */}
        <div style={{background:"#fff",border:"1.5px solid #dde4ed",borderRadius:20,
          padding:"16px 20px",marginBottom:14,display:"flex",alignItems:"center",gap:16}}>
          <div style={{position:"relative",width:64,height:64,flexShrink:0}}>
            <svg width="64" height="64" viewBox="0 0 64 64" style={{transform:"rotate(-90deg)"}}>
              <circle cx="32" cy="32" r="26" fill="none" stroke="#dde4ed" strokeWidth="6"/>
              <circle cx="32" cy="32" r="26" fill="none" stroke={overallPct>=80?"#2d7a4f":overallPct>=50?"#c47d0e":"#3b82f6"}
                strokeWidth="6" strokeLinecap="round"
                strokeDasharray={+(2*Math.PI*26).toFixed(1)}
                strokeDashoffset={+(2*Math.PI*26*(1-overallPct/100)).toFixed(1)}
                style={{transition:"stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:14,fontWeight:900}}>{overallPct}%</div>
          </div>
          <div>
            <div style={{fontSize:18,fontWeight:900}}>{MONTHS_ZH2[month]}月任務成就</div>
            <div style={{fontSize:12,color:"#7a8fa6",marginTop:3}}>
              已完成 {totalCompleted} / {totalScheduled} 次排程
            </div>
            <div style={{fontSize:11,color:"#7a8fa6",marginTop:2}}>{year} 年</div>
          </div>
        </div>
      </div>

      {/* 任務逐條進度 */}
      <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:10,paddingBottom:16}}>
        {habits.length===0 ? (
          <div style={{textAlign:"center",padding:"36px 0",border:"1.5px dashed #dde4ed",borderRadius:18}}>
            <div style={{fontSize:13,color:"#7a8fa6"}}>還沒有任務，去新增吧！</div>
          </div>
        ) : stats.length===0 ? (
          <div style={{textAlign:"center",padding:"36px 0",border:"1.5px dashed #dde4ed",borderRadius:18}}>
            <div style={{fontSize:13,color:"#7a8fa6"}}>本月沒有排程的任務。</div>
          </div>
        ) : (
          // 先顯示未完成（pct < 100），再顯示已完成
          [...stats].sort((a,b)=>a.pct-b.pct).map(({h,total,completed,pct})=>{
            const cat=catObj(h.category);
            const isDone = pct===100;
            return (
              <div key={h.id} style={{background:"#fff",border:"1.5px solid "+(isDone?"#bbf7d0":"#dde4ed"),
                borderRadius:16,padding:"13px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:20,flexShrink:0}}>{isDone?"✅":cat.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:isDone?"#7a8fa6":"#1a2333",
                      textDecoration:isDone?"line-through":"none"}}>{h.name}</div>
                    <div style={{fontSize:11,color:"#7a8fa6",marginTop:1,display:"flex",gap:4,alignItems:"center"}}>
                      {h.urgent&&<span style={s.badge}>緊急</span>}
                      <span style={{color:cat.color}}>{cat.lbl}</span>
                      <span>·</span>
                      <span>{completed}/{total} 次完成</span>
                    </div>
                  </div>
                  <div style={{fontSize:15,fontWeight:900,
                    color:pct===100?"#2d7a4f":pct>=50?"#c47d0e":"#b8c5d4",
                    flexShrink:0}}>{pct}%</div>
                </div>
                {/* 進度條 */}
                <div style={{height:6,background:"#eff2f6",borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:99,
                    background:pct===100?"#2d7a4f":pct>=50?"#c47d0e":"#3b82f6",
                    width:pct+"%",transition:"width 1s cubic-bezier(.4,0,.2,1)"}}/>
                </div>
              </div>
            );
          })
        )}
      </div>
    </>);
  }

  return (
    <div style={s.app}>
      <style>{`
        @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        @keyframes barFill{from{width:0}to{width:var(--bar-w)}}
      `}</style>
      {page==="home" ? <HomePage/> : page==="manage" ? <ManagePage/> : page==="chores" ? <ChoresPage/> : <AchievePage/>}
      <div style={s.navOuter}>
        <div style={s.navInner}>
          <button style={s.navBtn(page==="chores")} onClick={()=>setPage("chores")}>
            <span style={{fontSize:20}}>🏠</span>
            <span style={s.navLbl(page==="chores")}>團隊任務</span>
          </button>
          <button style={s.navBtn(page==="home")} onClick={()=>setPage("home")}>
            <span style={{fontSize:20}}>📋</span>
            <span style={s.navLbl(page==="home")}>個人任務</span>
          </button>
          <button style={s.navBtn(page==="achieve")} onClick={()=>setPage("achieve")}>
            <span style={{fontSize:20}}>🏆</span>
            <span style={s.navLbl(page==="achieve")}>成就</span>
          </button>
          <button style={s.navBtn(page==="manage")} onClick={()=>setPage("manage")}>
            <span style={{fontSize:20}}>⚙️</span>
            <span style={s.navLbl(page==="manage")}>管理</span>
          </button>
        </div>
      </div>
      {modal && <Modal/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
